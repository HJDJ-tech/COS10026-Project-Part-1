<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="description" content="Demonstrates some basic HTML content elements and CSS" />
  <meta name="keywords" content="HTML5, tags" />
  <meta name="author" content="A Lecturer"  />
  <title>Job Application</title>
  
  <link rel="stylesheet" type="text/css" href="Apply.css">

</head>

<header>
    <h1>HJDJ</h1>
    <!-- Site navigation -->
    <nav>
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="apply.html">Apply</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>
</header>

<body>
<a href="Applynow.jpg.png">  <img src="Applynow.jpg.png" alt="Photo of Applynow" /></a>


    <form method="post" action="http://mercury.swin.edu.au/it000000/jobapplication.php">
        <!--Note we have to use a special escape character to print an apostrophe on the Web page -->
        <fieldset>
        <legend>Full Name</legend>
        <p><label for="given">Given Name</label> 
            <!--Use an HTML5 email control -->
          <input type="text" name= "given" id="given" maxlength="20"/>
        </p>
        <p><label for="family">Family Name</label> 
            <!--Use an HTML5 email control -->
          <input type="text" name= "family" id="family" maxlength="20"/>
        </p>
        </fieldset>
        <fieldset>
            <legend>Gender</legend>
            <p><label for="Male">Male</label> 
                <input type="radio" id="Male" name="Gender" value="Male"/> <!--Allows only one button to be clicked-->
            </p>
            <p><label for="Female">Female</label> 
                <input type="radio" id="Female" name="Gender" value="Female"/>
            </p>
            <p><label for="Other">Other</label> 
                <input type="radio" id="Other" name="Gender" value="Other"/>
            </p>
        </fieldset>
        <fieldset>
            <legend>Job Listing</legend>
            <p><label for="referencenumber">Job refernce number</label> 
                <select name="referencenumber" id="referencenumber"> <!-- Drop down selection listy-->
                    <option value="WC-R-1398-03-06-S">WC-R-1398-03-06-S</option>			
                    <option value="LS-L-1976-04-09-V">LS-L-1976-04-09-V</option>
                    <option value="UY-E-1785-04-10-R">UY-E-1785-04-10-R</option>
                    <option value="TP-K-1294-05-09-F">TP-K-1294-05-09-F</option>
                    <option value="MN-L-1190-05-10-E">MN-L-1190-05-10-E</option>
                </select>
            </p>
        </fieldset>

        <fieldset>
            <legend>Availability</legend>
            <p><label for="availability">Availability</label> <!-- Drop down selection listy-->
                <select name="availability" id="availability">
                    <option value="Full-time">Full-time</option>			
                    <option value="Part-time">Part-time</option>
                    <option value="Casual">Casual</option>
                </select>
            </p>
        </fieldset>
        <fieldset>
            <legend>Work Rights</legend>
            <p><label for="workrights">Work Rights</label> 
                <select name="workrights" id="workrights"> <!-- Drop down selection listy-->
                    <option value="Citizen">Citizen</option>			
                    <option value="Permanent Resident">Permanent Resident</option>
                    <option value="Temporary Visa">Temporary Visa</option>
                </select>
            </p>
        </fieldset>

        <fieldset>
        <legend>Dat of Birth</legend>
        <p><label for="d">Date</label> 
            <input type="date" name= "d" id="d" placeholder="dd-mm-yyyy" maxlength="10" size="10"/>
        </fieldset>

        <fieldset>
            <legend>Location</legend>
            <p><label for="Address">Street Address</label> 
                <!--Use an HTML5 email control -->
              <input type="text" name= "Adress" id="Address" maxlength="40"/>
            </p>
            <p><label for="suburb">Suburb/Town</label> 
                <!--Use an HTML5 email control -->
              <input type="text" name= "suburb" id="suburb" maxlength="40"/>
            </p>
            </fieldset>
            <fieldset>
                <legend>State</legend>
                <p><label for="state">State</label> 
                    <select name="state" id="state">
                        <option value="VIC">VIC</option>			
                        <option value="NSW">NSW</option>
                        <option value="QLD">QLD</option>
                        <option value="SA">SA</option>
                        <option value="WA">WA</option>
                        <option value="TAS">TAS</option>
                        <option value="NT">NT</option>
                        <option value="ACT">ACT</option>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>Postcode</legend>
                <p><label for="postcode">Postcode</label> 
                    <!--Use an HTML5 email control -->
                  <input type="text" name= "postcode" id="postcode" maxlength="4"/> <!--Allows only 4 characters to be input-->
                </p>
                </fieldset>
                <fieldset>
                    <legend>Contact Details</legend>
                    <p><label for="email">Email</label> 
                        <!--Use an HTML5 email control -->
                      <input type="email" name= "email" id="email" maxlength="40"/>
                    </p>
                    <p><label for="phone">Phone Number</label> 
                        <!--Use an HTML5 email control -->
                      <input type="tel" name= "phone" id="phone" maxlength="10"/>
                    </p>
                    </fieldset>
      
    <input type= "submit" value="Register"/>
    <input type= "reset" value="Reset Form"/>
    
    </form>
    

</body>
</html>
